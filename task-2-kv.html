<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KV</title>
  <link rel="stylesheet" href="css/kv.css">
</head>
<body>
  <section class="kv">

    <img class="layer bg bg-main" src="assets/kv/slide1/bg.png" alt="background">
    <img class="layer bg bg-next" src="" alt="background">
    <div class="bg-gradient-overlay"></div>

    <div class="numbers-wrapper">
      <img class="layer numbers" src="assets/kv/slide1/text.png" alt="text">
    </div>

    <div class="smoke-wrapper">
      <img class="layer smoke" src="assets/kv/slide1/smoke.png" alt="smoke">
    </div>

    <img class="layer man" src="assets/kv/man.png" alt="man">

    <div class="kv-nav">
      <button class="kv-prev" type="button">
        <img src="assets/arrow.png" alt="prev">
      </button>

      <button class="kv-next" type="button">
        <img src="assets/arrow.png" alt="next">
      </button>
    </div>

  </section>
  <script src="js/kv/config.js"></script>
  <script src="js/kv/dom.js"></script>
  <script src="js/kv/math.js"></script>
  <script src="js/kv/media.js"></script>
  <script src="js/kv/app.js"></script>
  <script src="js/kv/index.js"></script>
</body>
</html>
